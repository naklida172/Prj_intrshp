name: flutter_spring_app
description: A Flutter app with Spring Boot backend
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # HTTP клиент
  dio: ^5.4.0
  
  # Кодогенерация API
  retrofit: ^4.0.1
  chopper: ^7.0.0  # альтернатива retrofit
  
  # State Management
  riverpod: ^2.4.0
  flutter_riverpod: ^2.4.0
  bloc: ^8.1.2
  flutter_bloc: ^8.1.3
  
  # Навигация
  go_router: ^12.0.0
  
  # Кэширование изображений
  cached_network_image: ^3.3.0
  
  # Выбор фото
  image_picker: ^1.0.4
  
  # Безопасное хранение
  flutter_secure_storage: ^9.0.0
  
  # WebSocket
  web_socket_channel: ^2.4.0
  
  # Вспомогательные пакеты
  json_annotation: ^4.8.1
  equatable: ^2.0.5
  intl: ^0.18.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  
  # Генераторы кода
  build_runner: ^2.4.7
  json_serializable: ^6.7.1
  retrofit_generator: ^7.0.8
  chopper_generator: ^7.0.0

flutter:
  uses-material-design: true
  
  # Раскомментируйте для добавления ассетов
  # assets:
  #   - assets/images/
  #   - assets/icons/